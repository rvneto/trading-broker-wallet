spring:
  application:
    name: broker-wallet-api

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/broker_wallet_db?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER:broker_user}
    password: ${DB_PASSWORD:broker_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Deixamos como validate para o Flyway assumir o controle
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true # Útil para bancos que já existem
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    consumer:
      group-id: broker-wallet-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.rvneto.broker.wallet.dto"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.rvneto.broker.wallet.dto.OrderEventDTO

app:
  wallet:
    default-currency: BRL

  kafka:
    consumer:
      topic-order-events: order-events-v1

server:
  port: 8085 # Rodando em porta diferente da 8080 para evitar conflitos

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
